<article class="insight-card">
    <a href="{{ item.link }}" class="insight-card-link">
        {% if item.thumbnail %}
        <div class="card-visual">
            <img src="{{ item.thumbnail }}" alt="" class="card-thumb" loading="lazy">
            <span class="effect-overlay">{{ item.effect_label }}</span>
        </div>
        {% else %}
        <div class="effect-block">{{ item.effect_label }}</div>
        {% endif %}
        <div class="card-content">
            <h3 class="card-title">{{ item.title }}</h3>
            <p class="card-preview">{{ item.hook or item.summary }}</p>
            <div class="card-meta">
                <span class="confidence-badge badge-{{ item.confidence }}">{{ item.confidence }}</span>
            </div>
            <div class="card-tags">
                {% for cat in item.categories[:3] %}
                <span class="tag">{{ cat }}</span>
                {% endfor %}
            </div>
        </div>
    </a>
</article>
