<div class="share-bar" data-share-id="{{ share_id }}" data-share-url="{{ share_url }}" data-share-text="{{ share_tweet | e }}">
    <span class="share-bar-label">Share this insight</span>
    <div class="share-bar-actions">
        <a class="share-btn share-btn-icon share-btn-x"
           href="https://x.com/intent/tweet?url={{ share_url | urlencode }}&amp;text={{ share_tweet | urlencode }}"
           target="_blank"
           rel="noopener noreferrer"
           data-share-method="twitter"
           aria-label="Share on X">
            <svg class="share-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
        </a>
        <a class="share-btn share-btn-icon share-btn-linkedin"
           href="https://www.linkedin.com/sharing/share-offsite/?url={{ share_url | urlencode }}"
           target="_blank"
           rel="noopener noreferrer"
           data-share-method="linkedin"
           aria-label="Share on LinkedIn">
            <svg class="share-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
        </a>
        <button type="button" class="share-btn share-btn-icon share-btn-native" data-share-method="native" hidden aria-label="Share via device">
            <svg class="share-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
            </svg>
        </button>
        <button type="button" class="share-btn" data-share-method="copy_link">Copy link</button>
    </div>
    <p class="share-bar-hint">LinkedIn caches previews for days — if the image looks wrong, <a href="{{ linkedin_inspector_url }}" target="_blank" rel="noopener noreferrer">refresh LinkedIn preview</a> first, then share again. X: <a href="https://cards-dev.twitter.com/validator" target="_blank" rel="noopener noreferrer">card validator</a>.</p>
</div>
<script src="/static/js/share.js?v={{ site.asset_version }}" defer></script>
