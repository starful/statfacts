<section class="reaction-panel" aria-label="Page feedback">
    <p class="reaction-panel-title">Was this page helpful?</p>
    <p class="reaction-panel-subtitle">Your feedback helps us improve StatFacts</p>
    <div class="reaction-container">
        <button id="btn-like" class="reaction-btn" type="button" onclick="toggleReaction('like')" aria-label="Like">
            <i class="fa-solid fa-thumbs-up"></i>
            <span id="count-like">0</span>
        </button>
        <button id="btn-dislike" class="reaction-btn" type="button" onclick="toggleReaction('dislike')" aria-label="Dislike">
            <i class="fa-solid fa-thumbs-down"></i>
            <span id="count-dislike">0</span>
        </button>
    </div>
</section>
<script>
(function () {
    const itemSlug = {{ reaction_slug | tojson }};

    document.addEventListener("DOMContentLoaded", async function () {
        try {
            const res = await fetch("/api/reactions/" + encodeURIComponent(itemSlug));
            const data = await res.json();
            document.getElementById("count-like").innerText = data.likes || 0;
            document.getElementById("count-dislike").innerText = data.dislikes || 0;
            const myReaction = localStorage.getItem("reaction_" + itemSlug);
            if (myReaction === "like") {
                document.getElementById("btn-like").classList.add("active-like");
            } else if (myReaction === "dislike") {
                document.getElementById("btn-dislike").classList.add("active-dislike");
            }
        } catch (error) {
            console.error("Failed to load reactions:", error);
        }
    });

    window.toggleReaction = async function (type) {
        const btnLike = document.getElementById("btn-like");
        const btnDislike = document.getElementById("btn-dislike");
        btnLike.style.pointerEvents = "none";
        btnDislike.style.pointerEvents = "none";
        try {
            const res = await fetch("/api/" + type + "/" + encodeURIComponent(itemSlug), { method: "POST" });
            const data = await res.json();
            if (data.status === "success") {
                document.getElementById("count-like").innerText = data.likes;
                document.getElementById("count-dislike").innerText = data.dislikes;
                btnLike.classList.remove("active-like");
                btnDislike.classList.remove("active-dislike");
                localStorage.removeItem("reaction_" + itemSlug);
                if (data.current_type === "like") {
                    btnLike.classList.add("active-like");
                    localStorage.setItem("reaction_" + itemSlug, "like");
                } else if (data.current_type === "dislike") {
                    btnDislike.classList.add("active-dislike");
                    localStorage.setItem("reaction_" + itemSlug, "dislike");
                }
            }
        } catch (error) {
            console.error("Failed to post reaction:", error);
        } finally {
            btnLike.style.pointerEvents = "auto";
            btnDislike.style.pointerEvents = "auto";
        }
    };
})();
</script>
