<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Guides - {{ site.site_name }}</title>
    <meta name="description" content="Browse all {{ site.site_name }} guides in {{ lang }}.">
    <link rel="canonical" href="{{ canonical }}" />
    <link rel="alternate" hreflang="en" href="{{ site.site_url }}/guide" />
    <link rel="alternate" hreflang="ko" href="{{ site.site_url }}/guide?lang=ko" />
    <link rel="alternate" hreflang="x-default" href="{{ site.site_url }}/guide" />
    <meta property="og:type" content="website">
    <meta property="og:title" content="All Guides - {{ site.site_name }}">
    <meta property="og:description" content="Browse all {{ site.site_name }} guides in {{ lang }}.">
    <meta property="og:url" content="{{ canonical }}">
    <meta property="og:image" content="{{ site.site_url }}/static/images/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    {% include '_head_icons.html' %}
    {% include '_ga.html' %}
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include 'header.html' %}

    <main>
        <div class="content-wrapper">
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="/">Home</a>
                <span aria-hidden="true">/</span>
                <span>Guides</span>
            </nav>

            <h2 class="section-title">📖 All {{ site.site_name }} guides</h2>

            <div class="guide-list-grid">
                {% for guide in guides.get(lang, []) %}
                <a href="/guide/{{ guide.id }}" class="guide-list-card">
                    <div class="card-visual">
                        <img src="{{ guide.thumbnail }}" alt="" class="card-thumb" loading="lazy">
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">{{ guide.title }}</h3>
                        <p class="card-summary">{{ guide.summary }}</p>
                    </div>
                </a>
                {% endfor %}
            </div>

            <div class="page-nav-actions">
                <a href="/" class="back-btn back-btn-secondary">← Explore topics</a>
            </div>
        </div>
    </main>

    {% include 'footer.html' %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "{{ site.site_name }} guides",
      "itemListElement": [
        {% for guide in guides.get(lang, []) %}
        {
          "@type": "ListItem",
          "position": {{ loop.index }},
          "url": "{{ site.site_url }}/guide/{{ guide.id }}",
          "name": "{{ guide.title }}"
        }{% if not loop.last %},{% endif %}
        {% endfor %}
      ]
    }
    </script>
</body>
</html>
